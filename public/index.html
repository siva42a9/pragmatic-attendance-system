<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
<meta name="viewport" content="width=1024">

<title>Attendance Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="company">

        <!-- Logo -->
        <img src="logo.png" alt="Pragmatic Logo" class="logo">

        <h1>Pragmatic Industrial Automation Solutions</h1>

        <p>Employee Attendance Management System</p>

    </div>

    <div class="login-box">

        <h2>Employee Login</h2>

        <input
        type="text"
        id="employee_id"
        placeholder="Employee ID">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button id="loginBtn">

            Login

        </button>

        <p id="msg"></p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
